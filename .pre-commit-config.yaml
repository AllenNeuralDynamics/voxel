# Pre-commit hooks for voxel.
#
# Layout: mostly local hooks (ruff, basedpyright) so versions track uv.lock,
# plus Astral's external uv-lock hook to keep the lockfile in sync with
# pyproject.toml. See ./CLAUDE.md for tool versions and rationale.
#
# First-time setup (per clone):
#     uvx pre-commit install        # wires up both pre-commit and pre-push
#
# Manual run across the whole repo:
#     uvx pre-commit run --all-files
#     uvx pre-commit run --all-files --hook-stage pre-push

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.2
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      - id: pytest
        name: pytest (excluding @pytest.mark.slow)
        entry: uv run pytest -m "not slow"
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
