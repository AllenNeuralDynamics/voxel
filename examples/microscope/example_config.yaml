instrument_name: &instrument_name exaspim

metadata:
  instrument_name: *instrument_name
  experiment_id: example_experiment
  subject_id: 123456
  experimenter_full_name: adam glaser
  immersion_medium: 0.05X SSC
  immersion_medium_index: 1.33
  x_anatomical_orientation: anterior_posterior
  y_anatomical_orientation: inferior_superior
  z_anatomical_orientation: left_right

acquisition:
  z_step_size: 0.5
  tile_overlap: 0.15
  scan_pattern: raster
  scan_direction: row_wise
  start_corner: top_left
  reverse_scan_path: false
  plan_file_path: ./example_plan.yaml
  channels:
    - red
    # - green

instrument:
  name: *instrument_name
  description: "A simulated instrument for testing purposes"

  daq:
    conn: Dev1
    tasks:
      acq_clock:
        type: clockgen
        kwds:
          out_pin: PFI0
          counter: ctr0
          freq_hz: 6
          duty_cycle: 0.5
          initial_delay_ms: 0
      acq_task:
        type: wavegen
        kwds:
          sample_rate_hz: 700000
          period_ms: 200
          trigger_task: acq_clock

  devices:
    simulated_camera_1:
      driver: voxel.drivers.cameras.simulated.SimulatedCamera
      kwds:
        pixel_size_um: 0.5, 0.5
        magnification: 40
        sensor_width_px: 4096
        sensor_height_px: 4096
        resize_method: tile
      acq_pin: ao2
    simulated_camera_2:
      driver: voxel.drivers.cameras.simulated.SimulatedCamera
      kwds:
        pixel_size_um: 0.5, 0.5
        magnification: 40
        sensor_width_px: 4096
        sensor_height_px: 4096
        resize_method: tile
      acq_pin: ao3
    vieworks_camera_1:
      driver: voxel.drivers.cameras.vieworks.VieworksCamera
      kwds:
        serial_number: MP151BDD022
        pixel_size_um: 0.5, 0.5
        magnification: 40
      acq_pin: ao4
    laser_488:
      driver: voxel.drivers.lasers.simulated.SimulatedLaser
      kwds:
        wavelength: 488
      acq_pin: ao5
    laser_561:
      driver: voxel.drivers.lasers.simulated.SimulatedLaser
      kwds:
        wavelength: 561
      acq_pin: ao6
    laser_405:
      driver: voxel.drivers.lasers.simulated.SimulatedLaser
      kwds:
        wavelength: 405
      acq_pin: ao7
    laser_507:
      driver: voxel.drivers.lasers.simulated.SimulatedLaser
      kwds:
        wavelength: 507
      acq_pin: ao8
    filter_wheel_1:
      driver: voxel.detection_path.FilterWheel
      kwds:
        filters:
          - BP488
          - BP561
    filter_wheel_2:
      driver: voxel.detection_path.FilterWheel
      kwds:
        filters:
          - BP405
          - BP561
    z-axis:
      driver: voxel.drivers.linear_axis.simulated.SimulatedLinearAxis
      kwds:
        dimension: Z
      acq_pin: ao3
    x-axis:
      driver: voxel.drivers.linear_axis.simulated.SimulatedLinearAxis
      kwds:
        dimension: X
    y-axis:
      driver: voxel.drivers.linear_axis.simulated.SimulatedLinearAxis
      kwds:
        dimension: Y
    simulated_camera_1_focus:
      driver: voxel.drivers.linear_axis.simulated.SimulatedLinearAxis
      kwds:
        dimension: N
    left_illumination_focus:
      driver: voxel.drivers.linear_axis.simulated.SimulatedLinearAxis
      kwds:
        dimension: N
    right_illumination_focus:
      driver: voxel.drivers.linear_axis.simulated.SimulatedLinearAxis
      kwds:
        dimension: N
    etl:
      driver: voxel.drivers.tunable_lenses.simulated.SimulatedTunableLens
      acq_pin: ao12

  io: &io_specs
    writers:
      imaris:
        driver: voxel.io.writers.imaris.ImarisWriter
      simple_writer:
        driver: voxel.io.writers.simple.SimpleWriter
    transfers:
      robocopy:
        driver: voxel.io.transfers.robocopy.RobocopyFileTransfer
        kwds:
          external_path: D:/voxel_test2
          local_path: D:/voxel_test

  paths:
    A:
      camera: simulated_camera_1
      io: *io_specs
      filter_wheel: filter_wheel_1
      focusing_axes:
        detection: simulated_camera_1_focus
        left: left_illumination_focus
        right: right_illumination_focus
      channels:
        red:
          laser: laser_561
          filter: BP561
        green:
          laser: laser_488
          filter: BP488
    B:
      camera: simulated_camera_2
      io: *io_specs
      filter_wheel: filter_wheel_2
      focusing_axes:
        left: left_illumination_focus
        right: right_illumination_focus
      channels:
        blue:
          laser: laser_405
          filter: BP405
        yellow:
          laser: laser_507
          filter: BP507

settings:
  channel.*.camera.acq_waveforms:
    min_voltage: 0.0
    max_voltage: 5.0
    is_digital: True
    rise_point: 0.0
    fall_point: 0.5

  device.simulated_camera_1:
    exposure_time_ms: 20.0
    pixel_type: 16
    roi_height_px: 512
    roi_width_px: 512
    bit_packing_mode: msb
  channel.*.writer:
    compression: lz4shuffle
    pixel_type: uint16
  channel.*.file_transfer:
    verify_transfer: True
    max_retry: 3
    timeout_s: 60
