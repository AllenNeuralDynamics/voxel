hal:
  nodes:
    primary:
      devices:
        nidaq_1:
          target: vxl.daq.SimulatedDaqmx
          init:
            device_name: "MockDev1"
        ao_main:
          target: vxl.daq.SimulatedAO
          init:
            hub: nidaq_1
            ports:
              laser_405: ao0
              laser_488: ao1
              laser_561: ao2
              laser_640: ao3
              laser_730: ao7
              camera_1: ao4
              camera_2: ao5
              aotf_1: ao6
        aotf_1:
          target: vxl.aotf.simulated.SimulatedAotf
          init: { blanking_mode: "external" }
        laser_405:
          target: &aotf_laser_target vxl.laser.simulated.SimulatedAOTFShutteredLaser
          init:
            wavelength: 405
            aotf: aotf_1
            aotf_channel: 1
            aotf_frequency_mhz: 110.5
        laser_488:
          target: *aotf_laser_target
          init:
            wavelength: 488
            aotf: aotf_1
            aotf_channel: 2
            aotf_frequency_mhz: 98.2
        laser_561:
          target: *aotf_laser_target
          init:
            wavelength: 561
            aotf: aotf_1
            aotf_channel: 3
            aotf_frequency_mhz: 87.4
        laser_640:
          target: *aotf_laser_target
          init:
            wavelength: 640
            aotf: aotf_1
            aotf_channel: 4
            aotf_frequency_mhz: 78.6
        laser_730:
          target: vxl.laser.simulated.SimulatedLaser
          init: { wavelength: 730 }
        fw_detection_shared:
          target: &fw_target vxl.axes.simulated.SimulatedDiscreteAxis
          init:
            slots:
              { 0: "Quad-DGRC", 1: "Dual-DR", 2: "Dual-GC", 3: "NIR-LP720" }
        fw_emission_cam1:
          target: *fw_target
          init:
            slots: { 0: "BP450", 1: "BP525", 2: "BP600", 3: "BP780" }
        fw_emission_cam2:
          target: *fw_target
          init:
            slots: { 0: "BP525", 1: "BP700", 2: "BP780" }
        x_axis:
          target: &axis_target vxl.axes.simulated.SimulatedContinuousAxis
          init: { lower_limit: 0, upper_limit: 36700 }
        y_axis:
          target: *axis_target
          init: { lower_limit: 0, upper_limit: 23000 }
        z_axis:
          target: *axis_target
          init: { lower_limit: 0, upper_limit: 50000, has_ttl_stepper: true }
      kind: subprocess

    node_1:
      devices:
        camera_1: &sim_camera
          target: vxl.camera.simulated.SimulatedCamera
          init:
            pixel_size_um: "3.76,3.76"
            sensor_size_px: "10640,14192"
      kind: subprocess
    node_2:
      devices:
        camera_2: *sim_camera
      kind: subprocess

  stage:
    x: x_axis
    y: y_axis
    z: z_axis

  detection:
    camera_1:
      filter_wheels: [fw_detection_shared, fw_emission_cam1]
      magnification: 8.0
    camera_2:
      filter_wheels: [fw_detection_shared, fw_emission_cam2]
      magnification: 8.0

  illumination:
    laser_405: {}
    laser_488: {}
    laser_561: {}
    laser_640: {}
    laser_730: {}

default:
  imaging:
    channels:
      dapi:
        detection: camera_1
        illumination: laser_405
        filters:
          fw_detection_shared: "Quad-DGRC"
          fw_emission_cam1: "BP450"
        desc: "DAPI nuclear stain using 405nm excitation"
        label: DAPI
        emission: 461
      gfp:
        detection: camera_2
        illumination: laser_488
        filters:
          fw_detection_shared: "Quad-DGRC"
          fw_emission_cam2: "BP525"
        desc: "Green fluorescent protein using 488nm excitation"
        label: GFP
        emission: 510
      rfp:
        detection: camera_1
        illumination: laser_561
        filters:
          fw_detection_shared: "Quad-DGRC"
          fw_emission_cam1: "BP600"
        desc: "Red fluorescent protein using 561nm excitation"
        label: RFP
        emission: 600
      cy5:
        detection: camera_2
        illumination: laser_640
        filters:
          fw_detection_shared: "Quad-DGRC"
          fw_emission_cam2: "BP700"
        desc: "Far-red Cy5 channel using 640nm excitation"
        label: Cy5
        emission: 670
      nir:
        detection: camera_1
        illumination: laser_730
        filters:
          fw_detection_shared: "NIR-LP720"
          fw_emission_cam1: "BP780"
        desc: "Near-infrared channel for iRFP/miRFP using 730nm excitation"
        label: NIR
        emission: 760

    profiles:
      dapi_gfp:
        channels: ["dapi", "gfp"]
        z_step: 1.0
        desc: "Simultaneous DAPI (cam1) and GFP (cam2) imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_1: &camera_waveform_ch1
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.0, max: 0.95 }
              laser_405: &laser_waveform_ch1
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.1, max: 0.9 }
              camera_2: &camera_waveform_ch2
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.02, max: 0.97 }
              laser_488: &laser_waveform_ch2
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.12, max: 0.92 }
              aotf_1: &aotf_blanking_waveform
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.05, max: 0.95 }

      dapi_cy5:
        channels: ["dapi", "cy5"]
        z_step: 1.0
        desc: "Simultaneous DAPI (cam1) and Cy5 (cam2) imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_1: *camera_waveform_ch1
              laser_405: *laser_waveform_ch1
              camera_2: *camera_waveform_ch2
              laser_640: *laser_waveform_ch2
              aotf_1: *aotf_blanking_waveform

      gfp_rfp:
        channels: ["gfp", "rfp"]
        z_step: 1.0
        desc: "Simultaneous GFP (cam2) and RFP (cam1) imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_1: *camera_waveform_ch1
              laser_561: *laser_waveform_ch1
              camera_2: *camera_waveform_ch2
              laser_488: *laser_waveform_ch2
              aotf_1: *aotf_blanking_waveform

      rfp_cy5:
        channels: ["rfp", "cy5"]
        z_step: 1.0
        desc: "Simultaneous RFP (cam1) and Cy5 (cam2) imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_1: *camera_waveform_ch1
              laser_561: *laser_waveform_ch1
              camera_2: *camera_waveform_ch2
              laser_640: *laser_waveform_ch2
              aotf_1: *aotf_blanking_waveform

      single_dapi:
        channels: ["dapi"]
        z_step: 1.0
        desc: "Single DAPI channel for nuclear staining"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_1: *camera_waveform_ch1
              laser_405: *laser_waveform_ch1
              aotf_1: *aotf_blanking_waveform

      single_gfp:
        channels: ["gfp"]
        z_step: 1.0
        desc: "Single GFP channel imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_2: *camera_waveform_ch1
              laser_488: *laser_waveform_ch1
              aotf_1: *aotf_blanking_waveform

      single_rfp:
        channels: ["rfp"]
        z_step: 1.0
        desc: "Single RFP channel imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_1: *camera_waveform_ch1
              laser_561: *laser_waveform_ch1
              aotf_1: *aotf_blanking_waveform

      single_cy5:
        channels: ["cy5"]
        z_step: 1.0
        desc: "Single Cy5 far-red channel imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_2: *camera_waveform_ch1
              laser_640: *laser_waveform_ch1
              aotf_1: *aotf_blanking_waveform

      single_nir:
        channels: ["nir"]
        z_step: 1.0
        desc: "Single NIR channel for iRFP/miRFP imaging"

        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            waveforms:
              camera_1: *camera_waveform_ch1
              laser_730: *laser_waveform_ch1

  stencil:
    x_offset: 0.0
    y_offset: 0.0
    overlap_x: 0.1
    overlap_y: 0.1
    z_start: 0.0
    z_end: 511.0

  traversal: snake_row

  output:
    max_level: 3
    compression: blosc.lz4
