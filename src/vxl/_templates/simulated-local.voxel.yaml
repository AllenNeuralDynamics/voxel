info:
  name: ""
  description: "Local configuration — all devices in-process (no ZMQ)"

rig:
  name: "Simulated Local Rig"

  devices:
    daq_hub:
      target: vxl.analog_out.simulated.SimulatedDaqmx
      init: { device_name: "MockDev1" }
    daq:
      target: vxl.analog_out.simulated.SimulatedAnalogOutput
      init:
        hub: daq_hub
        ports:
          laser_488: ao0
          laser_561: ao1
          camera_1: ao2
          aotf_1: ao3
    camera_1:
      target: vxl.camera.simulated.SimulatedCamera
      init:
        pixel_size_um: "3.76,3.76"
        sensor_size_px: "10640,14192"
    aotf_1:
      target: vxl.aotf.simulated.SimulatedAotf
      init: { blanking_mode: "external" }
    laser_488:
      target: &aotf_laser_target vxl.laser.simulated.SimulatedAOTFShutteredLaser
      init:
        wavelength: 488
        aotf: aotf_1
        aotf_channel: 1
        aotf_frequency_mhz: 98.2
    laser_561:
      target: *aotf_laser_target
      init:
        wavelength: 561
        aotf: aotf_1
        aotf_channel: 2
        aotf_frequency_mhz: 87.4
    fw_emission:
      target: vxl.axes.simulated.SimulatedDiscreteAxis
      init:
        slots: { 0: "BP525", 1: "BP600", 2: "BP700" }
    x_axis:
      target: &axis_target vxl.axes.simulated.SimulatedContinuousAxis
      init: { lower_limit: 0, upper_limit: 36700 }
    y_axis:
      target: *axis_target
      init: { lower_limit: 0, upper_limit: 23000 }
    z_axis:
      target: *axis_target
      init: { lower_limit: 0, upper_limit: 50000 }

stage:
  x: x_axis
  y: y_axis
  z: z_axis

detection:
  camera_1:
    filter_wheels: [fw_emission]
    magnification: 8.0

illumination:
  laser_488: {}
  laser_561: {}

channels:
  gfp:
    detection: camera_1
    illumination: laser_488
    filters:
      fw_emission: "BP525"
    desc: "GFP channel"
    label: GFP
    emission: 510
  rfp:
    detection: camera_1
    illumination: laser_561
    filters:
      fw_emission: "BP600"
    desc: "RFP channel"
    label: RFP
    emission: 600

profiles:
  single_gfp:
    channels: ["gfp"]
    sync:
      daq: &default_aosignals
        sample_rate: "100 kHz"
        duration: "0.2 s"
        rest_time: "0.05 s"
        clock_src: { type: internal }
        waveforms:
          camera_1: &camera_waveform
            type: pulse
            voltage: { min: 0.0, max: 5.0 }
            window: { min: 0.0, max: 0.95 }
          laser_488: &laser_488_waveform
            type: pulse
            voltage: { min: 0.0, max: 5.0 }
            window: { min: 0.1, max: 0.9 }
          aotf_1: &aotf_blanking_waveform
            type: pulse
            voltage: { min: 0.0, max: 5.0 }
            window: { min: 0.05, max: 0.95 }
    desc: "Single GFP channel"
  single_rfp:
    channels: ["rfp"]
    sync:
      daq:
        sample_rate: "100 kHz"
        duration: "0.2 s"
        rest_time: "0.05 s"
        clock_src: { type: internal }
        waveforms:
          camera_1: *camera_waveform
          laser_561:
            type: pulse
            voltage: { min: 0.0, max: 5.0 }
            window: { min: 0.1, max: 0.9 }
          aotf_1: *aotf_blanking_waveform
    desc: "Single RFP channel"

plan:
  stack_order: snake_row
  z_step: 1.0
  default_z_start: 0.0
  default_z_end: 511.0

output:
  store_path: ./data
  max_level: 3
  compression: blosc.lz4

grid:
  x_offset: 0.0
  y_offset: 0.0
  overlap_x: 0.1
  overlap_y: 0.1

stacks: {}
