hal:
  devices:
    ao_main:
      target: vxl.daq.SimulatedAnalogOutput
      init:
        hub: nidaq_1
        ports:
          laser_488: ao0
          laser_561: ao1
          camera_1: ao2
          camera_2: ao3
          aotf_1: ao4
    aotf_1:
      target: vxl.aotf.simulated.SimulatedAotf
      init: { blanking_mode: "external" }
    laser_488:
      target: &aotf_laser_target vxl.laser.simulated.SimulatedAOTFShutteredLaser
      init:
        wavelength: 488
        aotf: aotf_1
        aotf_channel: 1
        aotf_frequency_mhz: 98.2
    laser_561:
      target: *aotf_laser_target
      init:
        wavelength: 561
        aotf: aotf_1
        aotf_channel: 2
        aotf_frequency_mhz: 87.4
    fw_detection:
      target: &fw_target vxl.axes.simulated.SimulatedDiscreteAxis
      init:
        slots: { 0: "Quad-DGRC", 1: "Dual-DR" }
    fw_emission_cam1:
      target: *fw_target
      init:
        slots: { 0: "BP525", 1: "BP600" }
    fw_emission_cam2:
      target: *fw_target
      init:
        slots: { 0: "BP525", 1: "BP600" }
    x_axis:
      target: &axis_target vxl.axes.simulated.SimulatedContinuousAxis
      init: { lower_limit: 0, upper_limit: 36700 }
    y_axis:
      target: *axis_target
      init: { lower_limit: 0, upper_limit: 23000 }
    z_axis:
      target: *axis_target
      init: { lower_limit: 0, upper_limit: 50000 }
    nidaq_1:
      target: vxl.daq.SimulatedDaqmx
      init:
        device_name: "MockDev1"

  nodes:
    camera_node_1:
      devices:
        camera_1: &sim_camera
          target: vxl.camera.simulated.SimulatedCamera
          init:
            pixel_size_um: "3.76,3.76"
            sensor_size_px: "10640,14192"
      kind: subprocess
    camera_node_2:
      devices:
        camera_2: *sim_camera
      kind: subprocess

  stage:
    x: x_axis
    y: y_axis
    z: z_axis

  detection:
    camera_1:
      filter_wheels: [fw_detection, fw_emission_cam1]
      magnification: 8.0
    camera_2:
      filter_wheels: [fw_detection, fw_emission_cam2]
      magnification: 8.0

  illumination:
    laser_488: {}
    laser_561: {}

default:
  imaging:
    channels:
      gfp_cam1:
        detection: camera_1
        illumination: laser_488
        filters:
          fw_detection: "Quad-DGRC"
          fw_emission_cam1: "BP525"
        desc: "GFP on camera 1"
        label: GFP-1
        emission: 510
      gfp_cam2:
        detection: camera_2
        illumination: laser_488
        filters:
          fw_detection: "Quad-DGRC"
          fw_emission_cam2: "BP525"
        desc: "GFP on camera 2"
        label: GFP-2
        emission: 510
      rfp_cam1:
        detection: camera_1
        illumination: laser_561
        filters:
          fw_detection: "Quad-DGRC"
          fw_emission_cam1: "BP600"
        desc: "RFP on camera 1"
        label: RFP-1
        emission: 600
      rfp_cam2:
        detection: camera_2
        illumination: laser_561
        filters:
          fw_detection: "Quad-DGRC"
          fw_emission_cam2: "BP600"
        desc: "RFP on camera 2"
        label: RFP-2
        emission: 600

    profiles:
      dual_gfp:
        channels: ["gfp_cam1", "gfp_cam2"]
        z_step: 1.0
        desc: "Dual camera GFP imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            clock_src:
              type: internal
            waveforms:
              camera_1: &camera_waveform_ch1
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.0, max: 0.95 }
              camera_2: &camera_waveform_ch2
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.02, max: 0.97 }
              laser_488: &laser_waveform_ch1
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.1, max: 0.9 }
              aotf_1: &aotf_blanking_waveform
                type: pulse
                voltage: { min: 0.0, max: 5.0 }
                window: { min: 0.05, max: 0.95 }
      dual_rfp:
        channels: ["rfp_cam1", "rfp_cam2"]
        z_step: 1.0
        desc: "Dual camera RFP imaging"
        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            clock_src:
              type: internal
            waveforms:
              camera_1: *camera_waveform_ch1
              camera_2: *camera_waveform_ch2
              laser_561: *laser_waveform_ch1
              aotf_1: *aotf_blanking_waveform
      single_gfp:
        channels: ["gfp_cam1"]
        z_step: 1.0
        desc: "Single camera GFP"

        sync:
          ao_main:
            sample_rate: "100 kHz"
            duration: "0.2 s"
            rest_time: "0.05 s"
            clock_src:
              type: internal
            waveforms:
              camera_1: *camera_waveform_ch1
              laser_488: *laser_waveform_ch1
              aotf_1: *aotf_blanking_waveform

  stencil:
    x_offset: 0.0
    y_offset: 0.0
    overlap_x: 0.1
    overlap_y: 0.1
    z_start: 0.0
    z_end: 511.0

  traversal: snake_row

  output:
    max_level: 3
    compression: blosc.lz4
